  <style>
    :root {
      --background: white;
      --radius: 8px;
      /* Brand colors */
      --brand-25: 210, 100%, 98%;
      --brand-50: 206, 100%, 97%;
      --brand-100: 209, 100%, 91%;
      --brand-200: 206, 100%, 85%;
      --brand-300: 206, 100%, 76%;
      --brand-400: 207, 98%, 66%;
      --brand-500: 211, 95%, 58%;
      --brand-600: 215, 87%, 51%;
      --brand-700: 218, 80%, 46%;
      --brand-800: 220, 75%, 38%;
      --brand-900: 218, 68%, 31%;
      /* gray colors */
      --gray-25: #FCFCFD;
      --gray-50: #F9FAFB;
      --gray-100: #F2F4F7;
      --gray-200: #EAECF0;
      --gray-300: #D0D5DD;
      --gray-400: #98A2B3;
      --gray-500: #667085;
      --gray-600: #475467;
      --gray-700: #344054;
      --gray-800: #1D2939;
      --gray-900: #101828;
      /* errors */
      --error-25: #FFFBFA;
      --error-50: #FEF3F2;
      --error-100: #FEE4E2;
      --error-200: #FECDCA;
      --error-300: #FDA29B;
      --error-400: #F97066;
      --error-500: #F04438;
      --error-600: #D92D20;
      --error-700: #B42318;
      --error-800: #912018;
      --error-900: #7A271A;
    }

    html {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Roboto", sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .date-container {
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      width: fit-content;
      padding: 10px;
      position: absolute;
      z-index: 999999999;
      background: white;
    }

    .date-trigger {
      position: relative;
    }
  </style>
</head>
