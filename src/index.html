    const cityLedgerEl = document.querySelector("ir-city-ledger");
    if (cityLedgerEl) {
      (async () => {
        cityLedgerEl.propertyid = getId();
        cityLedgerEl.agentId = 227;
        cityLedgerEl.ticket = await getToken()

    }
