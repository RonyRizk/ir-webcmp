<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Daily Revenue</title>
    <script type="module" src="/build/ir-webcmp.esm.js"></script>
    <script nomodule src="/build/ir-webcmp.js"></script>
    <script src="scripts/index.js"></script>
</head>

<body>
    <ir-common></ir-common>
    <ir-daily-revenue baseurl="https://gateway.igloorooms.com/IR" language="en"></ir-daily-revenue>
    <script>
        const dailyRevenueEl = document.querySelector("ir-daily-revenue");
        if (dailyRevenueEl) {
            (async () => {
                dailyRevenueEl.propertyid = getId();
                dailyRevenueEl.ticket = await getToken()
            })();
        } 
    </script>

</body>

</html>
