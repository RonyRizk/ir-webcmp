<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Invoice preview</title>
    <script type="module" src="/build/ir-webcmp.esm.js"></script>
    <script nomodule src="/build/ir-webcmp.js"></script>
    <script src="scripts/index.js"></script>
    <style>
        body {
            overflow-x: hidden;
        }
    </style>
</head>

<body>
    <ir-common></ir-common>
    <ir-cl-invoice-preview baseurl="https://gateway.igloorooms.com/IR" language="en"></ir-cl-invoice-preview>


    <script>

        const invoicePreviewEl = document.querySelector("ir-cl-invoice-preview");
        if (invoicePreviewEl) {
            (async () => {
                invoicePreviewEl.propertyid = getId();
                invoicePreviewEl.agentId = 229;
                invoicePreviewEl.documentNumber = 2603201626;
                invoicePreviewEl.agentName = "";
                invoicePreviewEl.fromDate = "2026-01-30";
                invoicePreviewEl.toDate = "2026-03-31";

                invoicePreviewEl.ticket = await getToken();
            })();
        } 
    </script>

</body>

</html>
