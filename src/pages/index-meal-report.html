<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Meal report</title>
    <script type="module" src="/build/ir-webcmp.esm.js"></script>
    <script nomodule src="/build/ir-webcmp.js"></script>
    <script src="scripts/index.js"></script>
    <style>
        body {
            overflow-x: hidden;
        }
    </style>
</head>

<body>
    <ir-common></ir-common>
    <ir-meal-report baseurl="https://gateway.igloorooms.com/IR" language="en"></ir-meal-report>
    <script>
        const mealReportEl = document.querySelector("ir-meal-report");
        if (mealReportEl) {
            (async () => {
                mealReportEl.propertyid = getId();
                mealReportEl.ticket = await getToken()
            })();
        } 
    </script>

</body>

</html>
