<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>
    <script type="module" src="/build/ir-webcmp.esm.js"></script>
    <script nomodule src="/build/ir-webcmp.js"></script>
    <script src="scripts/index.js"></script>
    <style>
        body {
            overflow-x: hidden;
        }
    </style>
</head>

<body>
    <ir-common></ir-common>
    <ir-booking-details has-room-edit has-room-add has-room-delete baseurl="https://gateway.igloorooms.com/IR"
        language="en" has-print="true" has-receipt></ir-booking-details>
    <script>
        const bookingDetail = document.querySelector("ir-booking-details");
        setTimeout(async () => {
            const ticket = await getToken();
            bookingDetail.bookingNumber = "23080178267"
            bookingDetail.propertyid = getId();
            bookingDetail.ticket = ticket;
        }, 300)
    </script>

</body>

</html>
